apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-api
  namespace: gamecloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-api
  template:
    metadata:
      labels:
        app: quiz-api
    spec:
      containers:
        - name: quiz-api
          image: gamecloud/quiz-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: SUPABASE_URL
              value: "https://zsuszjlgatsylleuopff.supabase.co"
            - name: SUPABASE_KEY
              value: "sbp_e26e8d2f81f7f9a82a4023cfdd5cf816461c63cc"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
  namespace: gamecloud
spec:
  selector:
    app: quiz-api
  ports:
    - port: 80
      targetPort: 3001
