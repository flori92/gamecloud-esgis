apiVersion: apps/v1
kind: Deployment
metadata:
  name: puissance4-api
  namespace: gamecloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: puissance4-api
  template:
    metadata:
      labels:
        app: puissance4-api
    spec:
      containers:
        - name: puissance4-api
          image: gamecloud/puissance4-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: REDIS_HOST
              value: redis-service
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: p4-service
  namespace: gamecloud
spec:
  selector:
    app: puissance4-api
  ports:
    - port: 80
      targetPort: 5003
