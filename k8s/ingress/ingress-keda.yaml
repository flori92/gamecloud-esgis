apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gamecloud-ingress
  namespace: gamecloud
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: gamecloud.local
      http:
        paths:
          # Frontend
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          # Auth API
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 80

          # Pendu API
          - path: /api/pendu(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pendu-service
                port:
                  number: 80

          # Puissance 4 API
          - path: /api/p4(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: p4-service
                port:
                  number: 80

          # Quiz API
          - path: /api/quiz(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: quiz-service
                port:
                  number: 80

          # Score API - Via interceptor KEDA (serverless)
          - path: /api/scores(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: keda-add-ons-http-interceptor-proxy
                port:
                  number: 8080
          # L'interceptor sait rediriger vers score-service grâce
          # au HTTPScaledObject déclaré
