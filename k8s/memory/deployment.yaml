apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-api
  namespace: gamecloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-api
  template:
    metadata:
      labels:
        app: memory-api
    spec:
      containers:
        - name: memory-api
          image: gamecloud/memory-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: REDIS_HOST
              value: redis-service
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
  namespace: gamecloud
spec:
  selector:
    app: memory-api
  ports:
    - port: 80
      targetPort: 3002
